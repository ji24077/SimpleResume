name: Resume App CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: cd api && uv sync --dev

      - name: Run unit tests
        run: cd api && uv run pytest ../tests/unit

      - name: Run integration tests
        run: cd api && uv run pytest ../tests/integration

      - name: Run regression (golden) tests
        run: cd api && uv run pytest ../tests/golden
